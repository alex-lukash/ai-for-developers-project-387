# Our own CI: runs the project's tests on every push/PR.
#
# Separate from `hexlet-check.yml` (auto-generated Hexlet grading — never edit it).
# Notes:
#  - `spec/dist/openapi.yaml` is NOT committed, so any job that builds the backend
#    compiles the spec first (`npm --prefix spec run compile`) to produce the codegen
#    input. The frontend's generated client IS committed, so the frontend job needs
#    no Java/spec step.
#  - The backend toolchain is Java 25 (see backend/build.gradle.kts).

name: ci

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: commitlint (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the action can lint the whole PR/push range
      # Validates commit messages against .commitlintrc.json (see CONTRIBUTING.md).
      - uses: wagoid/commitlint-github-action@v6

  frontend:
    name: frontend (lint + unit + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm --prefix frontend ci
      - run: npm --prefix frontend run lint
      - run: npm --prefix frontend run test
      - run: npm --prefix frontend run build

  backend:
    name: backend (gradle test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: spec/package-lock.json
      # Compile TypeSpec -> spec/dist/openapi.yaml (codegen input; not committed).
      - run: npm --prefix spec ci
      - run: npm --prefix spec run compile
      # openApiGenerate -> compileKotlin -> tests.
      - run: ./gradlew test
        working-directory: backend

  e2e:
    name: e2e (Playwright, full stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: '**/package-lock.json'
      - run: npm --prefix spec ci
      - run: npm --prefix frontend ci
      - run: npm --prefix spec run compile
      # Pre-build so Playwright's `bootRun` starts within its webServer timeout.
      - run: ./gradlew assemble
        working-directory: backend
      - run: npx --prefix frontend playwright install --with-deps chromium
      # Playwright boots the backend (bootRun) + frontend (dev:backend) itself.
      # GitHub sets CI=true, so it starts fresh servers and retries once.
      - run: npm --prefix frontend run e2e
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7
