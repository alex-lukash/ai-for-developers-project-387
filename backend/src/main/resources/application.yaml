server:
  # Listen on the port from the PORT env var (used by deploy + the Hexlet check);
  # default to 8080 for local runs. Spring binds SERVER_PORT, not PORT, by default,
  # so the placeholder is required.
  port: ${PORT:8080}

spring:
  application:
    name: backend
  datasource:
    url: jdbc:h2:mem:scheduling;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
